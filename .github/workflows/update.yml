name: Auto Update Sports Schedule

on:
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন রাত ১২টায় স্বয়ংক্রিয়ভাবে রান হবে
  workflow_dispatch: # যখন ইচ্ছা ম্যানুয়ালি রান করার বাটন

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Fetch Latest Schedule
      run: node fetch_schedule.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add schedule.json
        git commit -m "Automated Schedule Update [Skip CI]" || exit 0
        git push
